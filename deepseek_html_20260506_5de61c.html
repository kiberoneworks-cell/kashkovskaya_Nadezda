<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Молния Маккуин: Ка-Чоу! Идеальный момент</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a1f1e 0%, #071513 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Impact', system-ui, -apple-system, 'Arial Narrow', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Основной контейнер игры */
        .game-container {
            background: #1e2a2a;
            border-radius: 72px;
            padding: 20px 25px 30px 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 4px rgba(255,255,255,0.1);
            border: 1px solid #ffc10740;
        }

        .game-panel {
            background: #2c3e2f;
            border-radius: 48px;
            padding: 20px;
            box-shadow: inset 0 0 10px #1a2a1a, 0 10px 15px rgba(0,0,0,0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 0 0 4px #f7b32b, 0 12px 28px black;
            cursor: pointer;
            background: #2b2b1f;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 20px;
            margin-bottom: 10px;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .score-card {
            background: #000000aa;
            backdrop-filter: blur(6px);
            border-radius: 60px;
            padding: 8px 22px;
            font-weight: bold;
            color: #ffde9c;
            text-shadow: 0 2px 0 #aa3a00;
            font-size: 1.7rem;
            letter-spacing: 2px;
            font-family: monospace;
            border: 1px solid #f5b642;
        }

        .score-card span {
            color: #f5ffb0;
            font-size: 2rem;
            margin-right: 6px;
        }

        .combo-box {
            background: #2c1a1a;
            border-radius: 60px;
            padding: 5px 20px;
            font-weight: bold;
            color: #ffaa55;
            font-size: 1.3rem;
            border-bottom: 3px solid #ff6600;
        }

        .message-area {
            background: #010b0bcc;
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 8px 18px;
            font-size: 1rem;
            font-weight: bold;
            color: #ffd966;
            font-family: monospace;
            text-align: center;
        }

        button {
            background: #ed3b2f;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            font-family: inherit;
            padding: 8px 28px;
            border-radius: 60px;
            color: white;
            text-shadow: 0 1px 0 #7a2e00;
            box-shadow: 0 5px 0 #751d0e;
            cursor: pointer;
            transition: 0.05s linear;
            letter-spacing: 1px;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #751d0e;
        }

        .controls-hint {
            background: #b95f1f30;
            border-radius: 30px;
            padding: 6px 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #fcd48d;
            text-align: center;
        }

        @keyframes kaChowFlash {
            0% { text-shadow: 0 0 0px #ffaa00; }
            50% { text-shadow: 0 0 20px #ff6600, 0 0 8px red; }
            100% { text-shadow: 0 0 0px #ffaa00; }
        }

        .ka-chow-effect {
            animation: kaChowFlash 0.2s ease-in-out 3;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 12px;
            color: #7e9a6b;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <div class="game-panel">
            <canvas id="gameCanvas" width="800" height="400" style="width:100%; height:auto; max-width:800px; aspect-ratio:800/400"></canvas>

            <div class="info-bar">
                <div class="score-card"><span>⚡</span> <span id="scoreValue">0</span></div>
                <div class="combo-box">🔥 КОМБО: <span id="comboValue">0</span>x</div>
                <div class="message-area" id="messageBox">▶ НАЖМИ ПРОБЕЛ / КЛИК ◀</div>
            </div>
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 6px;">
                <button id="resetButton">ЗАНОВО 🏁</button>
            </div>
            <div class="controls-hint">
                ⚡ КЛИКНИ ПО ИГРЕ или ПРОБЕЛ — поймай КРАСНУЮ ЗОНУ! ⚡
            </div>
            <footer>🎬 "Kachow! Perfect timing" — Молния Маккуин</footer>
        </div>
    </div>
</div>

<script>
    (function(){
        // ----- Игровой движок "Ка-Чоу! Идеальный момент" -----
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Размеры канваса (фиксированные для логики)
        canvas.width = 800;
        canvas.height = 400;

        // ----- Игровые параметры -----
        let score = 0;              // общий счёт
        let combo = 0;             // текущая комбо-серия (сбрасывается при промахе)
        let bestCombo = 0;         // рекорд комбо за сессию (отображаем в углу опционально)
        
        // Шкала перегрева / заряда "Ка-Чоу"
        let heatValue = 0.0;        // от 0 до 1
        let heatDirection = 1;       // 1 = нагрев, -1 = охлаждение
        let gameActive = true;       // всегда активно, но мы можем блокировать спам
        
        // флаги для защиты от спама кликов (один клик за попытку)
        let canAttempt = true;
        let cooldownTimer = null;
        
        // Эффекты
        let flashEffect = 0;          // >0 рисуем свечение
        let lastPerfect = false;       // для сообщений
        let infoMessage = "НАЖМИ В КРАСНОЙ ЗОНЕ!";
        let messageTimeout = null;
        
        // Рекорд очков (лучший результат)
        let highScore = 0;
        
        // Анимация моргания "ка-чоу"
        let kaChowParticle = 0;
        
        // ----- Вспомогательные функции -----
        function setMessage(msg, isError = false) {
            if(messageTimeout) clearTimeout(messageTimeout);
            infoMessage = msg;
            const msgDiv = document.getElementById('messageBox');
            if(msgDiv) {
                msgDiv.style.color = isError ? "#ffa098" : "#ffea9e";
                msgDiv.innerText = msg;
            }
            messageTimeout = setTimeout(() => {
                if(document.getElementById('messageBox')) {
                    document.getElementById('messageBox').style.color = "#ffd966";
                    document.getElementById('messageBox').innerText = "▶ ЖМИ В МОМЕНТ ПЕРЕГРЕВА! ◀";
                    infoMessage = "▶ ЖМИ В МОМЕНТ ПЕРЕГРЕВА! ◀";
                }
            }, 1500);
        }
        
        // Обновление UI очков и комбо
        function updateUI() {
            document.getElementById('scoreValue').innerText = Math.floor(score);
            document.getElementById('comboValue').innerText = combo;
            if(score > highScore) {
                highScore = Math.floor(score);
                // не храним отдельно в ux, но в памяти есть
            }
        }
        
        // Сброс комбо с сообщением
        function breakCombo() {
            if(combo > bestCombo) bestCombo = combo;
            combo = 0;
            updateUI();
            setMessage("❌ Промах! Комбо сброшено! ❌", true);
            // анимация растерянности (мелкий визуал)
            flashEffect = 0.3;
        }
        
        // Успешное нажатие в красной зоне
        function perfectHit() {
            // начисление очков: база 100 + комбо * 20 (до 500 макс)
            let addPoints = 100 + Math.min(combo * 20, 400);
            score += addPoints;
            combo++;
            if(combo > bestCombo) bestCombo = combo;
            
            // эффект "ка-чоу" визуальный
            kaChowParticle = 12;
            flashEffect = 0.9;
            lastPerfect = true;
            
            // вибрация (если поддерживается)
            if(navigator.vibrate) navigator.vibrate(50);
            
            // дополнительно: смена направления шкалы после удара (имитация отскока перегрева)
            // при отличном нажатии сбрасываем шкалу почти в ноль, но добавляем небольшую задержку
            heatValue = 0.12;
            heatDirection = 1;   // снова начинает нагреваться
            
            setMessage(`⚡ КА-ЧОУ! +${addPoints} 🔥 КОМБО ${combo}x ⚡`);
            updateUI();
            
            // Доп. анимация на canvas
        }
        
        // Нажатие игрока
        function attemptActivation() {
            if(!gameActive) return;
            if(!canAttempt) return;   // защита от многократного нажатия за тик
            
            // проверка: красная зона это heatValue >= 0.85? (Critical Overheat)
            const isInRedZone = (heatValue >= 0.82 && heatValue <= 1.0);
            
            if(isInRedZone) {
                // идеальный удар!
                perfectHit();
                // небольшая блокировка, чтобы нельзя было нажать дважды за 0.1 сек
                canAttempt = false;
                if(cooldownTimer) clearTimeout(cooldownTimer);
                cooldownTimer = setTimeout(() => {
                    canAttempt = true;
                }, 180);
            } 
            else {
                // промах (слишком рано или поздно — но вне зоны)
                breakCombo();
                // штраф: небольшое откат очков? Нет, просто сброс комбо.
                // Откат шкалы на 0.2 для наказания
                heatValue = Math.max(0.0, heatValue - 0.25);
                if(heatValue < 0.1) heatValue = 0.05;
                heatDirection = 1;  // опять нагрев
                canAttempt = false;
                if(cooldownTimer) clearTimeout(cooldownTimer);
                cooldownTimer = setTimeout(() => {
                    canAttempt = true;
                }, 220);
                // небольшое содрогание
                flashEffect = 0.4;
            }
        }
        
        // Логика обновления тепловой шкалы (вызывается каждый кадр)
        function updateHeat(deltaTime) {
            // скорость изменения: ~ 0.9 единицы в секунду (чтобы полный цикл длился ~1.1 сек)
            let speed = 0.85;  // в секунду
            let step = speed * deltaTime;
            
            if(heatDirection === 1) {
                heatValue += step;
                if(heatValue >= 1.0) {
                    heatValue = 1.0;
                    // при достижении максимума без нажатия -> небольшая проигрышная механика (перегрев)
                    if(heatValue >= 0.99 && canAttempt) {
                        // игрок опоздал - перегрев мотора: сброс комбо
                        if(combo > 0) {
                            breakCombo();
                        }
                        heatDirection = -1; // начинаем остывать
                        heatValue = 0.95;
                        setMessage("⚠️ ДВИГАТЕЛЬ ПЕРЕГРЕЛСЯ! Комбо потеряно! ⚠️", true);
                        if(cooldownTimer) clearTimeout(cooldownTimer);
                        canAttempt = false;
                        setTimeout(() => { canAttempt = true; }, 300);
                    } else {
                        heatDirection = -1;
                    }
                }
            } 
            else { // охлаждение
                heatValue -= step;
                if(heatValue <= 0.0) {
                    heatValue = 0.0;
                    heatDirection = 1;
                }
            }
            
            // удерживаем границы
            heatValue = Math.min(1.0, Math.max(0.0, heatValue));
        }
        
        // ----- Отрисовка графики в стиле Молнии Маккуин -----
        let lastTimestamp = 0;
        let lastFrameTime = performance.now();
        
        function drawMcqueen(x, y, isHappy, intensity) {
            // рисуем стилизованную машинку: кузов, молния, глаза
            ctx.save();
            ctx.shadowBlur = 0;
            // блики?
            // кузов
            ctx.beginPath();
            ctx.roundRect(x-55, y-25, 110, 50, 14);
            ctx.fillStyle = "#e3342f";
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(x-35, y-30, 70, 12, 6);
            ctx.fillStyle = "#b91c1c";
            ctx.fill();
            // молния на боку
            ctx.beginPath();
            ctx.moveTo(x-20, y-8);
            ctx.lineTo(x-10, y-12);
            ctx.lineTo(x-14, y-2);
            ctx.lineTo(x-4, y-2);
            ctx.lineTo(x-18, y+12);
            ctx.lineTo(x-10, y+2);
            ctx.lineTo(x-20, y+2);
            ctx.fillStyle = "#ffcc44";
            ctx.fill();
            // колёса
            ctx.fillStyle = "#222";
            ctx.beginPath();
            ctx.arc(x-38, y+18, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#555";
            ctx.beginPath();
            ctx.arc(x-38, y+18, 6, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+38, y+18, 12, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#555";
            ctx.beginPath();
            ctx.arc(x+38, y+18, 6, 0, Math.PI*2);
            ctx.fill();
            
            // глаза (большие, стиль Маккуин)
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(x-22, y-12, 9, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+8, y-12, 9, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#0a2f44";
            ctx.beginPath();
            ctx.arc(x-22 + (isHappy? -1:0), y-13, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+8 + (isHappy? -1:0), y-13, 5, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(x-25, y-15, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x+5, y-15, 2, 0, Math.PI*2);
            ctx.fill();
            // улыбка / нахмуренность
            ctx.beginPath();
            if(isHappy) {
                ctx.arc(x-7, y-2, 18, 0.05, Math.PI - 0.05);
                ctx.strokeStyle = "#2c1a0a";
                ctx.lineWidth = 2.5;
                ctx.stroke();
            } else {
                ctx.beginPath();
                ctx.arc(x-7, y, 15, Math.PI + 0.2, Math.PI*2 -0.2, true);
                ctx.stroke();
            }
            // номер 95
            ctx.font = "bold 18px 'Impact'";
            ctx.fillStyle = "#fff3c9";
            ctx.shadowBlur = 0;
            ctx.fillText("95", x-8, y+5);
            ctx.restore();
        }
        
        // функция анимации кадра
        function animate() {
            const now = performance.now();
            let dt = Math.min(0.033, (now - lastFrameTime) / 1000);
            if(dt <= 0) dt = 1/60;
            lastFrameTime = now;
            
            // Обновляем тепловую шкалу
            updateHeat(dt);
            
            // уменьшаем эффекты
            if(flashEffect > 0) flashEffect -= dt * 3;
            else flashEffect = 0;
            if(kaChowParticle > 0) kaChowParticle -= dt * 12;
            else kaChowParticle = 0;
            
            // Отрисовка всего
            drawCanvas();
            
            requestAnimationFrame(animate);
        }
        
        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // фон — асфальт с эффектом скорости
            ctx.fillStyle = "#2d2218";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            for(let i=0;i<60;i++) {
                ctx.fillStyle = "#aa8c54";
                ctx.fillRect( (i*70 + (performance.now()*0.2)%70) % canvas.width, canvas.height-40, 25, 3);
            }
            // трасса
            ctx.fillStyle = "#4a3b28";
            ctx.fillRect(0, canvas.height-50, canvas.width, 50);
            ctx.fillStyle = "#ffc107";
            ctx.fillRect(0, canvas.height-53, canvas.width, 4);
            
            // ШКАЛА ПЕРЕГРЕВА "КА-ЧОУ"
            const barX = 70;
            const barY = 45;
            const barW = 660;
            const barH = 26;
            
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#222";
            ctx.fillRect(barX, barY, barW, barH);
            // градиент шкалы
            const grad = ctx.createLinearGradient(barX, barY, barX+barW, barY);
            grad.addColorStop(0, "#32cd32");
            grad.addColorStop(0.7, "#f0ad4e");
            grad.addColorStop(0.85, "#d9534f");
            grad.addColorStop(1, "#b31f1f");
            ctx.fillStyle = grad;
            let fillW = barW * heatValue;
            ctx.fillRect(barX, barY, fillW, barH);
            
            // Красная зона (опасная зона)
            ctx.globalAlpha = 0.35;
            ctx.fillStyle = "#ff3333";
            ctx.fillRect(barX + barW*0.82, barY, barW*0.18, barH);
            ctx.globalAlpha = 1.0;
            ctx.strokeStyle = "#ffdd99";
            ctx.lineWidth = 1.5;
            ctx.strokeRect(barX + barW*0.82, barY, barW*0.18, barH);
            
            // метка "KACHOW ZONE"
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "#ffe6b3";
            ctx.fillText("🔴 ЗОНА КА-ЧОУ!", barX+barW*0.82+5, barY-4);
            
            // ползунок-стрелка
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.moveTo(barX+fillW-4, barY-8);
            ctx.lineTo(barX+fillW, barY-2);
            ctx.lineTo(barX+fillW-8, barY-2);
            ctx.fill();
            
            // машина Молния Маккуин
            let intensity = Math.min(1, flashEffect);
            let isHappy = (combo>0 && heatValue>0.7) ? true : (combo>1);
            let mcX = canvas.width/2;
            let mcY = canvas.height-38;
            
            // Если "ка-чоу" частицы -> дополнительный блеск
            if(kaChowParticle > 0) {
                ctx.save();
                ctx.shadowBlur = 16;
                ctx.shadowColor = "#ff8833";
                drawMcqueen(mcX, mcY, true, 1);
                ctx.restore();
                // надпись ка-чоу
                ctx.font = "bold 28px 'Impact'";
                ctx.fillStyle = "#ffaa33";
                ctx.shadowBlur = 6;
                ctx.fillText("⚡ K A - C H O W ! ⚡", mcX-110, mcY-55);
                ctx.fillStyle = "#ff6600";
                ctx.font = "bold 26px monospace";
                ctx.fillText("⚡ K A - C H O W ! ⚡", mcX-108, mcY-57);
                ctx.shadowBlur = 0;
            } else {
                drawMcqueen(mcX, mcY, isHappy, 0);
            }
            
            // доп. свечение при промахе
            if(flashEffect>0.2 && kaChowParticle<1) {
                ctx.fillStyle = "#ffaa3355";
                ctx.beginPath();
                ctx.rect(0,0,canvas.width,canvas.height);
                ctx.fill();
            }
            
            // текст шкалы
            ctx.font = "bold 14px 'Segoe UI'";
            ctx.fillStyle = "#fee3a0";
            ctx.fillText("ТЕМПЕРАТУРА МОТОРА >>", barX, barY-8);
            if(heatValue >= 0.82) {
                ctx.fillStyle = "#ff884d";
                ctx.font = "bold 17px monospace";
                ctx.fillText("!!! КРАСНАЯ ЗОНА !!!", barX+barW-170, barY+20);
            }
            
            // комбо рекорд
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "#f5bc70";
            ctx.fillText("🏆 МАКС КОМБО: "+bestCombo, canvas.width-130, 27);
            ctx.fillText("⭐ РЕКОРД: "+Math.floor(highScore), canvas.width-130, 47);
            
            // подсказка нажатия
            ctx.font = "12px monospace";
            ctx.fillStyle = "#bd9e5f";
            ctx.fillText("⚡ ПРОБЕЛ или ЛКМ по игре ⚡", 20, canvas.height-12);
        }
        
        // вспомогательный полифилл для roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+h-r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                return this;
            };
        }
        
        // сброс игры
        function fullReset() {
            score = 0;
            combo = 0;
            bestCombo = 0;
            heatValue = 0.15;
            heatDirection = 1;
            updateUI();
            if(messageTimeout) clearTimeout(messageTimeout);
            setMessage("🔄 НОВАЯ ГОНКА! ЛОВИ МОМЕНТ! 🔄");
            canAttempt = true;
            if(cooldownTimer) clearTimeout(cooldownTimer);
            cooldownTimer = null;
            canAttempt = true;
            flashEffect = 0;
            kaChowParticle = 0;
        }
        
        // обработчики событий
        function handleAction(e) {
            if(e.type === 'keydown') {
                if(e.code === 'Space') {
                    e.preventDefault();
                    attemptActivation();
                }
                return;
            }
            // click на canvas
            attemptActivation();
        }
        
        // исключить прокрутку при пробеле
        window.addEventListener('keydown', function(e) {
            if(e.code === 'Space') {
                e.preventDefault();
            }
        });
        
        canvas.addEventListener('click', handleAction);
        document.addEventListener('keydown', handleAction);
        
        const resetBtn = document.getElementById('resetButton');
        resetBtn.addEventListener('click', () => {
            fullReset();
        });
        
        // начальная установка
        fullReset();
        updateUI();
        lastFrameTime = performance.now();
        animate();
    })();
</script>
</body>
</html>
